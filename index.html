<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>final; destination</title>
  <link rel="stylesheet" href="styles.css?v=6">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

<div id="intro">
  <div id="intro-text">tap</div>
</div>

<video id="bg-video" loop playsinline preload="auto">
  <source src="https://github.com/overwarm/final/releases/download/a/final.destination.mp4" type="video/mp4">
</video>

<script>
const intro = document.getElementById("intro");
const video = document.getElementById("bg-video");

video.style.display = "none";

intro.addEventListener("click", () => {
  intro.style.display = "none";
  video.style.display = "block";
  video.currentTime = 0;
  video.muted = false;
  video.play();
}, { once: true });
</script>

</body>
</html>
